<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - VibraBike</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f4f4f4;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>📊 Dashboard de Asistencia</h1>
    <p>Sistema de gestión de asistencias VibraBike</p>
</div>

<div class="stats">
    <div class="stat-card">
        <div class="stat-number" id="totalAlumnos">0</div>
        <div>Alumnos Registrados</div>
    </div>
    <div class="stat-card">
        <div class="stat-number" id="asistenciasHoy">0</div>
        <div>Asistencias Hoy</div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8080/api/v1';

    async function cargarStats() {
        try {
            const response = await fetch(`${API_BASE}/alumnos`);
            const alumnos = await response.json();
            document.getElementById('totalAlumnos').textContent = alumnos.length;
        } catch (error) {
            console.error('Error cargando stats:', error);
        }
    }

    cargarStats();
</script>
</body>
</html>
