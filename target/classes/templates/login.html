<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .login-bg {
            background: linear-gradient(135deg, #0ea5e9 0%, #3b82f6 100%);
        }

        .card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }

        .input-field {
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
        }

        .btn-login {
            background: linear-gradient(to right, #0ea5e9, #3b82f6);
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(14 165 233 / 0.3);
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
    <!-- Card -->
    <div class="card bg-white rounded-3xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-sky-500 to-blue-600 px-8 py-10 text-white text-center">
            <div class="mx-auto w-20 h-20 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center mb-6">
                <i class="fas fa-shield-alt text-4xl"></i>
            </div>
            <h1 class="text-3xl font-semibold tracking-tight">Bienvenido</h1>
            <p class="text-sky-100 mt-2 text-lg">Inicia sesión en tu cuenta</p>
        </div>

        <!-- Form -->
        <div class="px-8 py-10">
            <form id="loginForm" class="space-y-6">
                <!-- Username / Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Usuario o Email
                    </label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                            <i class="fas fa-user"></i>
                        </div>
                        <input
                                type="text"
                                id="username"
                                required
                                class="input-field w-full pl-11 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none text-gray-800 placeholder-gray-400 text-base"
                                placeholder="tu@email.com"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Contraseña
                    </label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                            <i class="fas fa-lock"></i>
                        </div>
                        <input
                                type="password"
                                id="password"
                                required
                                class="input-field w-full pl-11 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none text-gray-800 placeholder-gray-400 text-base"
                                placeholder="••••••••"
                        >
                        <button type="button" onclick="togglePassword()"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i id="eyeIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember me + Forgot password -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 accent-sky-500">
                        <span class="text-gray-600">Recordarme</span>
                    </label>
                    <a href="#" class="text-sky-600 hover:text-sky-700 font-medium transition-colors">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>

                <!-- Login Button -->
                <button type="submit"
                        class="btn-login w-full text-white font-semibold py-4 rounded-2xl text-lg shadow-lg flex items-center justify-center gap-2">
                    <span>Iniciar Sesión</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Divider -->
            <div class="my-8 flex items-center gap-4">
                <div class="flex-1 h-px bg-gray-200"></div>
                <span class="text-gray-400 text-sm font-medium">O</span>
                <div class="flex-1 h-px bg-gray-200"></div>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-4">
                <button onclick="fakeLogin('Google')"
                        class="flex items-center justify-center gap-3 border border-gray-300 hover:border-gray-400 py-3.5 rounded-2xl transition-all hover:bg-gray-50">
                    <i class="fab fa-google text-red-500"></i>
                    <span class="text-sm font-medium text-gray-700">Google</span>
                </button>
                <button onclick="fakeLogin('Microsoft')"
                        class="flex items-center justify-center gap-3 border border-gray-300 hover:border-gray-400 py-3.5 rounded-2xl transition-all hover:bg-gray-50">
                    <i class="fab fa-microsoft text-blue-600"></i>
                    <span class="text-sm font-medium text-gray-700">Microsoft</span>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-8 py-6 bg-gray-50 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-500">
                ¿No tienes cuenta?
                <a href="#" class="text-sky-600 hover:text-sky-700 font-semibold">Regístrate gratis</a>
            </p>
        </div>
    </div>

    <!-- Status -->
    <div class="text-center mt-8">
        <p id="status" class="text-white/80 text-sm"></p>
    </div>
</div>

<script>
    // Tailwind script already loaded via CDN

    function togglePassword() {
        const passwordField = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        } else {
            passwordField.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        }
    }

    // Form submit
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const statusEl = document.getElementById('status');
        const username = document.getElementById('username').value;

        statusEl.innerHTML = `
            <i class="fas fa-spinner fa-spin mr-2"></i>
            Iniciando sesión...
        `;

        // Simulate API call
        setTimeout(() => {
            statusEl.innerHTML = `
                <span class="text-emerald-300">✅ Sesión iniciada correctamente como <strong>${username}</strong></span>
            `;

            // You can redirect here in a real app:
            // window.location.href = "/dashboard";
        }, 1800);
    });

    function fakeLogin(provider) {
        const statusEl = document.getElementById('status');
        statusEl.textContent = `Redirigiendo a ${provider}...`;

        setTimeout(() => {
            statusEl.innerHTML = `<span class="text-emerald-300">✅ Conectado con ${provider}</span>`;
        }, 1200);
    }

    // Keyboard support
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const form = document.getElementById('loginForm');
            if (document.activeElement.tagName !== 'BUTTON') {
                form.dispatchEvent(new Event('submit'));
            }
        }
    });
</script>
</body>
</html>
