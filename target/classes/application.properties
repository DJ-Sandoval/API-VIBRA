spring.application.name=APIVibraBike

spring.datasource.url=jdbc:mysql://localhost:3308/VibraBikeCenterBD?useSSL=false&serverTimezone=UTC
spring.datasource.username=josesas
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Mexico_City
server.port=8080

spring.thymeleaf.cache=false

# ===================================================================
# MONITOREO Y OBSERVABILIDAD (Actuator + Prometheus)
# ===================================================================
# Exponer los endpoints necesarios (Salud e infraestructura de Prometheus)
management.endpoints.web.exposure.include=health,prometheus

# Habilitar métricas detalladas para el servidor y base de datos
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Incluir detalles de base de datos en las métricas
management.metrics.enable.hikari=true